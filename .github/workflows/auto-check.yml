name: Auto Check YouTube Comments

on:
  schedule:
    # Runs every 6 hours (change as needed: https://crontab.guru)
    - cron: '0 */6 * * *'
  workflow_dispatch:  # Also allows manual trigger from GitHub UI

jobs:
  update-scores:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3

      - name: Run comment checker
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node scripts/check-comments.mjs

      - name: Commit updated scores
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/scores.json data/config.json
          git diff --staged --quiet || git commit -m "chore: auto-update scores [$(date -u +'%Y-%m-%dT%H:%M:%SZ')]"
          git push
