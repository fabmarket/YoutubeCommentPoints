<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yorum İnceleme — Özel Panel</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="style.css" />
    <style>
        /* ——— Page-specific overrides ——— */
        .review-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1.2rem 5rem;
            position: relative;
            z-index: 2;
        }

        .review-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .review-title {
            font-family: var(--font-title);
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: var(--clr-parchment);
            letter-spacing: 0.05em;
        }

        /* Search & controls bar */
        .review-controls {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .review-controls input {
            flex: 1;
            min-width: 200px;
        }

        /* Stats bar */
        .review-stats {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.4rem;
            padding: 0.8rem 1.2rem;
            background: var(--clr-stone);
            border: 1px solid var(--clr-border);
            border-radius: 4px;
            font-family: var(--font-title);
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            color: var(--clr-text-dim);
            text-transform: uppercase;
        }

        .review-stat-val {
            color: var(--clr-gold);
            font-size: 1rem;
        }

        /* User block */
        .user-block {
            background: var(--clr-stone);
            border: 1px solid var(--clr-border);
            border-radius: 5px;
            margin-bottom: 1.2rem;
            overflow: hidden;
            animation: fadeUp 0.35s ease both;
        }

        .user-block-header {
            display: grid;
            grid-template-columns: 40px 40px 1fr auto;
            align-items: center;
            gap: 0.8rem;
            padding: 0.9rem 1.2rem;
            background: linear-gradient(135deg, rgba(35, 60, 24, 0.25) 0%, transparent 100%);
            border-bottom: 1px solid var(--clr-border);
            cursor: pointer;
            transition: background var(--transition);
        }

        .user-block-header:hover {
            background: linear-gradient(135deg, rgba(35, 60, 24, 0.40) 0%, transparent 100%);
        }

        .user-rank {
            font-family: var(--font-title);
            font-size: 0.85rem;
            color: var(--clr-text-dim);
            text-align: center;
        }

        .ub-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--clr-border);
        }

        .ub-avatar-placeholder {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--clr-forest), var(--clr-stone-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-title);
            font-size: 0.85rem;
            color: var(--clr-leaf-light);
            font-weight: 700;
        }

        .ub-info {
            min-width: 0;
        }

        .ub-name {
            font-family: var(--font-title);
            font-size: 0.95rem;
            color: var(--clr-parchment);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ub-meta {
            font-family: var(--font-accent);
            font-style: italic;
            font-size: 0.72rem;
            color: var(--clr-text-dim);
            margin-top: 0.1rem;
        }

        .ub-points {
            font-family: var(--font-title);
            font-size: 1rem;
            color: var(--clr-gold);
            text-shadow: 0 0 8px rgba(200, 151, 42, 0.45);
            font-weight: 700;
            white-space: nowrap;
            text-align: right;
        }

        .ub-toggle {
            font-size: 0.75rem;
            color: var(--clr-text-dim);
            display: block;
            text-align: right;
        }

        /* Comment list inside user block */
        .ub-comments {
            padding: 0;
            display: none;
        }

        .ub-comments.open {
            display: block;
        }

        .ub-comment {
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid rgba(74, 62, 40, 0.25);
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 0.8rem;
            align-items: start;
        }

        .ub-comment:last-child {
            border-bottom: none;
        }

        .ub-comment-text {
            font-family: var(--font-accent);
            font-size: 0.88rem;
            color: var(--clr-text);
            line-height: 1.65;
        }

        .ub-comment-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.25rem;
            flex-shrink: 0;
        }

        .ub-comment-date {
            font-size: 0.65rem;
            color: var(--clr-text-dim);
            font-family: var(--font-body);
            white-space: nowrap;
        }

        .ub-comment-link {
            font-size: 0.68rem;
            color: var(--clr-leaf-light);
            text-decoration: none;
            white-space: nowrap;
            padding: 0.18rem 0.45rem;
            border: 1px solid rgba(90, 128, 64, 0.35);
            border-radius: 2px;
            transition: all var(--transition);
        }

        .ub-comment-link:hover {
            background: rgba(90, 128, 64, 0.15);
            color: var(--clr-leaf);
        }

        /* No comments placeholder */
        .ub-no-comments {
            padding: 0.9rem 1.2rem;
            font-family: var(--font-accent);
            font-style: italic;
            font-size: 0.82rem;
            color: var(--clr-text-dim);
        }

        /* Loading / empty */
        .review-empty {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--clr-text-dim);
            font-family: var(--font-accent);
            font-style: italic;
        }

        /* Sort select */
        .sort-select {
            font-size: 0.75rem;
            padding: 0.4rem 0.6rem;
        }

        /* ——— Latest Comments Panel ——— */
        .new-comments-card {
            background: var(--clr-stone);
            border: 1px solid var(--clr-border);
            border-radius: 5px;
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .new-comments-card-title {
            font-family: var(--font-title);
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            color: var(--clr-leaf-light);
            text-transform: uppercase;
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid var(--clr-border);
            background: linear-gradient(135deg, rgba(35, 80, 24, 0.2) 0%, transparent 100%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .new-comments-card-title span {
            color: var(--clr-gold);
            font-size: 0.8rem;
        }

        .new-comment-row {
            display: grid;
            grid-template-columns: 36px 1fr auto;
            gap: 0.8rem;
            align-items: start;
            padding: 0.85rem 1.2rem;
            border-bottom: 1px solid rgba(74, 62, 40, 0.2);
            animation: fadeUp 0.3s ease both;
        }

        .new-comment-row:last-child {
            border-bottom: none;
        }

        .nc-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--clr-border);
        }

        .nc-avatar-placeholder {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--clr-forest), var(--clr-stone-light));
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-title);
            font-size: 0.8rem;
            color: var(--clr-leaf-light);
            font-weight: 700;
        }

        .nc-body {
            min-width: 0;
        }

        .nc-author {
            font-family: var(--font-title);
            font-size: 0.82rem;
            color: var(--clr-parchment);
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nc-text {
            font-family: var(--font-accent);
            font-size: 0.84rem;
            color: var(--clr-text);
            line-height: 1.6;
            word-break: break-word;
        }

        .nc-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 0.3rem;
            flex-shrink: 0;
        }

        .nc-date {
            font-size: 0.63rem;
            color: var(--clr-text-dim);
            white-space: nowrap;
        }

        .nc-link {
            font-size: 0.65rem;
            color: var(--clr-leaf-light);
            text-decoration: none;
            white-space: nowrap;
            padding: 0.15rem 0.4rem;
            border: 1px solid rgba(90, 128, 64, 0.35);
            border-radius: 2px;
            transition: all var(--transition);
        }

        .nc-link:hover {
            background: rgba(90, 128, 64, 0.15);
            color: var(--clr-leaf);
        }

        .nc-empty {
            padding: 1.2rem 1.4rem;
            font-family: var(--font-accent);
            font-style: italic;
            font-size: 0.82rem;
            color: var(--clr-text-dim);
        }
    </style>
</head>

<body class="admin-page">

    <!-- ===== LOGIN ===== -->
    <div id="login-overlay" class="page-wrapper" style="min-height:100vh;justify-content:center;">
        <div class="admin-login-box">
            <div style="font-size:2rem;margin-bottom:0.4rem;">📜</div>
            <h1 class="admin-login-title">Yorum İnceleme</h1>
            <p class="admin-login-subtitle">Özel yönetici erişimi gerekiyor</p>
            <div id="login-error" class="alert alert-error hidden">Yanlış şifre.</div>
            <div class="form-group">
                <label class="form-label" for="login-pw">Şifre</label>
                <input class="form-input" type="password" id="login-pw" placeholder="••••••••"
                    autocomplete="current-password" />
            </div>
            <button class="btn btn-primary btn-full" id="login-btn">🌿 Giriş Yap</button>
        </div>
    </div>

    <!-- ===== REVIEW PANEL ===== -->
    <div id="review-panel" class="review-container hidden">

        <div class="review-header">
            <div>
                <h1 class="review-title">📜 Yorum İnceleme Paneli</h1>
                <p
                    style="font-family:var(--font-accent);font-style:italic;color:var(--clr-text-dim);font-size:0.8rem;margin-top:0.25rem;">
                    Tüm kullanıcılar ve yorumları
                </p>
            </div>
            <div style="display:flex;gap:0.6rem;flex-wrap:wrap;">
                <a href="index.html" class="btn btn-secondary">← Ana Sayfa</a>
                <a href="admin.html" class="btn btn-secondary">⚙ Admin</a>
                <button id="logout-btn" class="btn btn-secondary">Çıkış</button>
            </div>
        </div>

        <!-- Stats bar -->
        <div class="review-stats" id="review-stats" style="display:none;">
            <div>Toplam Kullanıcı: <span class="review-stat-val" id="stat-users">—</span></div>
            <div>Toplam Yorum: <span class="review-stat-val" id="stat-comments">—</span></div>
            <div>Toplam Puan: <span class="review-stat-val" id="stat-points">—</span></div>
        </div>

        <!-- ===== EN SON YAPILAN YORUMLAR ===== -->
        <div id="new-comments-card" class="new-comments-card" style="display:none;">
            <div class="new-comments-card-title">
                🆕 En Son Yapılan Yorumlar
                <span id="new-comments-count"></span>
            </div>
            <div id="new-comments-list">
                <div class="nc-empty">Son taramada yeni yorum bulunamadı.</div>
            </div>
        </div>

        <!-- Banned Users Panel (Hmm.html specific) -->
        <div id="banned-mgmt-card" class="admin-card" style="display:none; margin-bottom: 2.5rem;">
            <div
                style="font-family:var(--font-title);font-size:0.65rem;letter-spacing:0.15em;color:#d46060;text-transform:uppercase;margin-bottom:0.8rem; border-bottom: 1px solid rgba(212,96,96,0.2); padding-bottom: 0.4rem;">
                🚫 Yasaklı / Engellenmiş Kullanıcılar</div>
            <div id="banned-list" style="display:flex;flex-wrap:wrap;gap:0.5rem;"></div>
        </div>

        <!-- Controls -->
        <div class="review-controls">
            <input class="form-input" type="text" id="review-search" placeholder="Kullanıcı veya yorum ara…" />
            <select class="form-select sort-select" id="review-sort">
                <option value="points">Puana Göre ↓</option>
                <option value="comments">Yoruma Göre ↓</option>
                <option value="name">İsme Göre A–Z</option>
            </select>
            <button class="btn btn-primary" id="load-btn">🔄 Kullanıcıları Yükle</button>
            <button class="btn btn-secondary" id="expand-all-btn" style="display:none;">⊞ Hepsini Aç</button>
            <button class="btn btn-secondary" id="collapse-all-btn" style="display:none;">⊟ Hepsini Kapat</button>
        </div>

        <!-- User list -->
        <div id="user-blocks"></div>

    </div>

    <script>
        const LS_PASS = 'ytcp_admin_pass';
        const LS_OWNER = 'ytcp_gh_owner';
        const LS_REPO = 'ytcp_gh_repo';
        const DEFAULT_PASS = 'youtubecomments2026';

        function getPass() { return localStorage.getItem(LS_PASS) || DEFAULT_PASS; }

        // ——— Login ———
        document.getElementById('login-btn').addEventListener('click', doLogin);
        document.getElementById('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

        function doLogin() {
            const pw = document.getElementById('login-pw').value;
            if (pw === getPass()) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('review-panel').classList.remove('hidden');
            } else {
                document.getElementById('login-error').classList.remove('hidden');
                document.getElementById('login-pw').value = '';
                document.getElementById('login-pw').focus();
            }
        }

        document.getElementById('logout-btn').addEventListener('click', () => location.reload());

        // ——— Data ———
        let _allUsers = []; // sorted array of {id, ...userData}
        let _loadedScores = null; // saved full object for saving

        document.getElementById('load-btn').addEventListener('click', loadData);
        document.getElementById('review-search').addEventListener('input', renderBlocks);
        document.getElementById('review-sort').addEventListener('change', renderBlocks);
        document.getElementById('expand-all-btn').addEventListener('click', () => toggleAll(true));
        document.getElementById('collapse-all-btn').addEventListener('click', () => toggleAll(false));

        async function loadData() {
            const owner = localStorage.getItem(LS_OWNER) || '';
            const repo = localStorage.getItem(LS_REPO) || '';
            const btn = document.getElementById('load-btn');

            if (!owner || !repo) {
                alert('GitHub kullanıcı adı ve repo adı admin panelinde kayıtlı olmalı.');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Yükleniyor…';
            document.getElementById('user-blocks').innerHTML =
                '<div class="review-empty">Veriler çekiliyor…</div>';

            try {
                const res = await fetch(
                    `https://raw.githubusercontent.com/${owner}/${repo}/main/data/scores.json?t=${Date.now()}`,
                    { mode: 'cors' }
                );
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const scores = await res.json();
                _loadedScores = scores;

                _allUsers = Object.entries(scores.users || {})
                    .map(([id, u]) => ({ id, ...u }));

                renderBannedList();
                renderNewComments(scores.newComments || []);

                // Stats
                const totalComments = _allUsers.reduce((s, u) => s + (u.commentCount || 0), 0);
                const totalPoints = _allUsers.reduce((s, u) => s + (u.points || 0), 0);
                document.getElementById('stat-users').textContent = _allUsers.length.toLocaleString('tr-TR');
                document.getElementById('stat-comments').textContent = totalComments.toLocaleString('tr-TR');
                document.getElementById('stat-points').textContent = totalPoints.toLocaleString('tr-TR');
                document.getElementById('review-stats').style.display = '';
                document.getElementById('expand-all-btn').style.display = '';
                document.getElementById('collapse-all-btn').style.display = '';

                renderBlocks();
            } catch (e) {
                document.getElementById('user-blocks').innerHTML =
                    `<div class="review-empty">❌ Yüklenemedi: ${e.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.textContent = '🔄 Kullanıcıları Yükle';
            }
        }

        function getSortedFiltered() {
            const q = document.getElementById('review-search').value.trim().toLowerCase();
            const sort = document.getElementById('review-sort').value;

            let list = _allUsers;

            if (q) {
                list = list.filter(u => {
                    if (u.name.toLowerCase().includes(q)) return true;
                    const comments = u.comments || [];
                    return comments.some(c => (c.text || '').toLowerCase().includes(q));
                });
            }

            list = [...list].sort((a, b) => {
                if (sort === 'points') return b.points - a.points;
                if (sort === 'comments') return (b.commentCount || 0) - (a.commentCount || 0);
                if (sort === 'name') return a.name.localeCompare(b.name, 'tr');
                return 0;
            });

            return list;
        }

        function renderBlocks() {
            if (!_allUsers.length) return;
            const q = document.getElementById('review-search').value.trim().toLowerCase();
            const list = getSortedFiltered();
            const container = document.getElementById('user-blocks');

            if (!list.length) {
                container.innerHTML = '<div class="review-empty">Arama sonucu bulunamadı.</div>';
                return;
            }

            container.innerHTML = '';
            list.forEach((u, idx) => {
                const rank = _allUsers.indexOf(u) + 1; // original rank
                const block = buildUserBlock(u, idx + 1, q);
                container.appendChild(block);
            });
        }

        function buildUserBlock(u, displayIdx, searchQ) {
            const comments = u.comments || [];
            const filteredComments = searchQ
                ? comments.filter(c => (c.text || '').toLowerCase().includes(searchQ) || u.name.toLowerCase().includes(searchQ))
                : comments;

            const div = document.createElement('div');
            div.className = 'user-block';
            div.style.animationDelay = `${displayIdx * 0.03}s`;

            const avatarHtml = u.avatar
                ? `<img class="ub-avatar" src="${esc(u.avatar)}" alt="${esc(u.name)}" loading="lazy" onerror="this.outerHTML='<div class=\\'ub-avatar-placeholder\\'>${esc(u.name.charAt(0))}</div>'">`
                : `<div class="ub-avatar-placeholder">${esc(u.name.charAt(0))}</div>`;

            const rankIcon = displayIdx === 1 ? '👑' : displayIdx === 2 ? '🥈' : displayIdx === 3 ? '🥉' : `#${displayIdx}`;

            div.innerHTML = `
      <div class="user-block-header" onclick="toggleBlock(this)">
        <div class="user-rank">${rankIcon}</div>
        ${avatarHtml}
        <div class="ub-info">
          <div class="ub-name">${esc(u.name)}</div>
          <div class="ub-meta">${(u.commentCount || 0)} yorum · ${(u.points || 0).toLocaleString('tr-TR')} puan</div>
        </div>
        <div>
          <div class="ub-points">${(u.points || 0).toLocaleString('tr-TR')}</div>
          <div class="ub-toggle">▼ ${filteredComments.length} yorum</div>
        </div>
      </div>
      <div class="ub-comments" id="ub-${esc(u.id)}">
        ${filteredComments.length === 0
                    ? '<div class="ub-no-comments">Bu kullanıcının kaydedilmiş yorumu yok. (Yorum geçmişini yenile butonunu kullanın)</div>'
                    : filteredComments.map(c => buildCommentRow(c)).join('')
                }
      </div>`;

            return div;
        }

        function buildCommentRow(c) {
            const dateStr = c.date ? new Date(c.date).toLocaleDateString('tr-TR', { day: '2-digit', month: 'short', year: 'numeric' }) : '';
            const vtLink = c.videoId
                ? `<a class="ub-comment-link" href="https://www.youtube.com/watch?v=${esc(c.videoId)}${c.id ? '&lc=' + esc(c.id) : ''}" target="_blank" rel="noopener">📺 Videoya git</a>`
                : '';
            return `
      <div class="ub-comment">
        <div class="ub-comment-text">${esc(c.text || '—')}</div>
        <div class="ub-comment-meta">
          ${dateStr ? `<span class="ub-comment-date">📅 ${dateStr}</span>` : ''}
          ${vtLink}
        </div>
      </div>`;
        }

        function toggleBlock(header) {
            const commentsDiv = header.nextElementSibling;
            const isOpen = commentsDiv.classList.toggle('open');
            const toggle = header.querySelector('.ub-toggle');
            toggle.textContent = (isOpen ? '▲ ' : '▼ ') + toggle.textContent.slice(2);
        }

        function toggleAll(open) {
            document.querySelectorAll('.ub-comments').forEach(el => {
                el.classList.toggle('open', open);
            });
            document.querySelectorAll('.ub-toggle').forEach(el => {
                el.textContent = (open ? '▲ ' : '▼ ') + el.textContent.slice(2);
            });
        }

        // --- Banned Functions ---
        function renderBannedList() {
            if (!_loadedScores) return;
            const banned = _loadedScores.bannedUsers || [];
            const card = document.getElementById('banned-mgmt-card');
            const list = document.getElementById('banned-list');

            if (!banned.length) {
                card.style.display = 'none';
                return;
            }

            card.style.display = 'block';
            list.innerHTML = banned.map(uid => {
                const u = _loadedScores.users[uid];
                const label = u ? u.name : uid;
                return `
                <span style="background:rgba(92,26,26,0.3); border:1px solid #8a3030; border-radius:3px; padding:0.25rem 0.6rem; font-size:0.75rem; color:#d46060; display:flex; align-items:center; gap:0.4rem;">
                  🚫 ${esc(label)}
                  <button onclick="unbanUser('${esc(uid)}')" style="background:none; border:none; color:#d46060; cursor:pointer; font-size:1.1rem; line-height:1; padding:0;">✕</button>
                </span>`;
            }).join('');
        }

        async function unbanUser(uid) {
            if (!_loadedScores) return;
            if (!confirm(`Bu kullanıcının yasağını kaldırmak istiyor musun?`)) return;

            _loadedScores.bannedUsers = (_loadedScores.bannedUsers || []).filter(b => b !== uid);
            renderBannedList();

            // Save to GitHub
            const owner = localStorage.getItem(LS_OWNER);
            const repo = localStorage.getItem(LS_REPO);
            const pat = localStorage.getItem('ytcp_gh_pat'); // need PAT

            if (!owner || !repo || !pat) {
                alert('Yasak kaldırıldı ama kaydedilmedi (PAT/Bilgi eksik).');
                return;
            }

            try {
                // We use global function if available or simple fetch
                await saveScoresToGitHub(_loadedScores, owner, repo, pat, m => console.log(m));
                alert('Yasak başarıyla kaldırıldı.');
            } catch (e) {
                alert('Kaydedilirken hata oluştu: ' + e.message);
            }
        }

        function esc(str) {
            return String(str)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // ——— New Comments Panel ———
        function renderNewComments(newComments) {
            const card = document.getElementById('new-comments-card');
            const list = document.getElementById('new-comments-list');
            const countEl = document.getElementById('new-comments-count');

            if (!newComments || !newComments.length) {
                card.style.display = 'none';
                return;
            }

            card.style.display = 'block';
            countEl.textContent = newComments.length + ' yorum';

            list.innerHTML = newComments.map((c, idx) => {
                const avatarHtml = c.authorAvatar
                    ? `<img class="nc-avatar" src="${esc(c.authorAvatar)}" alt="${esc(c.authorName)}" loading="lazy" onerror="this.outerHTML='<div class=\'nc-avatar-placeholder\'>${esc((c.authorName || '?').charAt(0))}</div>'">`
                    : `<div class="nc-avatar-placeholder">${esc((c.authorName || '?').charAt(0))}</div>`;

                const dateStr = c.date
                    ? new Date(c.date).toLocaleDateString('tr-TR', { day: '2-digit', month: 'short', year: 'numeric' })
                    : '';

                const videoLink = c.videoId
                    ? `<a class="nc-link" href="https://www.youtube.com/watch?v=${esc(c.videoId)}${c.commentId ? '&lc=' + esc(c.commentId) : ''}" target="_blank" rel="noopener">📺 Git</a>`
                    : '';

                return `<div class="new-comment-row" style="animation-delay:${idx * 0.04}s">
                    ${avatarHtml}
                    <div class="nc-body">
                        <div class="nc-author">${esc(c.authorName || 'Anonim')}</div>
                        <div class="nc-text">${esc(c.text || '—')}</div>
                    </div>
                    <div class="nc-meta">
                        ${dateStr ? `<span class="nc-date">📅 ${dateStr}</span>` : ''}
                        ${videoLink}
                    </div>
                </div>`;
            }).join('');
        }
    </script>
    <script src="js/scores.js"></script>
</body>

</html>
